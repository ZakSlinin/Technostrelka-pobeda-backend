version: '3.9'

services:
  subscriptions:
    build:
      context: ./subscriptions-service
    container_name: subscriptions_app
    depends_on:
      - db
    environment:
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=db
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
    networks:
      - gzg-money-network

  db:
    image: postgres:15-alpine
    container_name: subscriptions_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    networks:
      - gzg-money-network
    volumes:
      - subs_db_data:/var/lib/postgresql/data
  swagger-ui:
    image: swaggerapi/swagger-ui
    container_name: gzg_money
    ports:
      - "8081:8080"
    environment:
      SWAGGER_JSON: /openapi.yaml
    volumes:
      - ./openapi.yaml:/openapi.yaml:ro
    networks:
      - gzg-money-network
networks:
  gzg-money-network:
    driver: bridge
volumes:
  subs_db_data: