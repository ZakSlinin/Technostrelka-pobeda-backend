version: '3.9'

services:
  swagger-ui:
    image: swaggerapi/swagger-ui
    container_name: gzg_money
    ports:
      - "8081:8080"
    environment:
      SWAGGER_JSON: /openapi.yaml
    volumes:
      - ./openapi.yaml:/openapi.yaml:ro
    networks:
      - gzg-money-network
networks:
  gzg-money-network:
    driver: bridge
